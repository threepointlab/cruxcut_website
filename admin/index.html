<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CruxCut Admin</title>
    <style>
        :root {
            color-scheme: light;
            --canvas: #ffffff;
            --cloud: #f7f7f7;
            --hairline: #e8e8e8;
            --steel: #c2c2c2;
            --ink: #1a1a1a;
            --charcoal: #3d3d3d;
            --graphite: #636363;
            --primary: #024ad8;
            --primary-deep: #0e3191;
            --on-primary: #ffffff;
            --shadow-soft: 0 2px 8px rgba(26, 26, 26, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--cloud);
            color: var(--ink);
            font-family: "Forma DJR Micro", Manrope, Inter, Arial, Helvetica, sans-serif;
            font-size: 16px;
            line-height: 1.38;
            letter-spacing: 0;
        }

        .shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 64px;
            padding: 0 32px;
            border-bottom: 1px solid var(--hairline);
            background: var(--canvas);
        }

        .brand {
            margin: 0;
            font-size: 24px;
            font-weight: 500;
            line-height: 1.17;
        }

        .admin-badge {
            border: 1px solid var(--ink);
            border-radius: 8px;
            padding: 6px 12px;
            color: var(--ink);
            background: var(--canvas);
            font-size: 14px;
            line-height: 1.5;
        }

        .content {
            width: min(960px, calc(100% - 48px));
            margin: 0 auto;
            padding: 80px 0;
        }

        .intro {
            display: grid;
            gap: 12px;
            margin-bottom: 32px;
        }

        .intro h1 {
            margin: 0;
            max-width: 720px;
            font-size: 44px;
            font-weight: 500;
            line-height: 1;
            letter-spacing: 0;
        }

        .intro p {
            margin: 0;
            max-width: 620px;
            color: var(--charcoal);
            font-size: 18px;
            line-height: 1.33;
        }

        .tool-list {
            display: grid;
            gap: 16px;
        }

        .tool-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 24px;
            align-items: center;
            border: 1px solid var(--hairline);
            border-radius: 16px;
            background: var(--canvas);
            box-shadow: var(--shadow-soft);
            padding: 24px;
            color: inherit;
            text-decoration: none;
        }

        .tool-card:hover {
            border-color: var(--steel);
        }

        .tool-copy {
            display: grid;
            gap: 8px;
        }

        .tool-card h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 500;
            line-height: 1.17;
        }

        .tool-card p {
            margin: 0;
            color: var(--graphite);
            font-size: 14px;
            line-height: 1.5;
        }

        .tool-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            border-radius: 4px;
            background: var(--primary);
            color: var(--on-primary);
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .tool-card:hover .tool-action {
            background: var(--primary-deep);
        }

        @media (max-width: 720px) {
            .topbar {
                padding: 16px;
            }

            .content {
                width: calc(100% - 32px);
                padding: 48px 0;
            }

            .intro h1 {
                font-size: 32px;
            }

            .tool-card {
                grid-template-columns: 1fr;
            }

            .tool-action {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <p class="brand">CruxCut Admin</p>
            <span class="admin-badge">Internal tools</span>
        </header>

        <main class="content">
            <section class="intro">
                <h1>관리자 도구</h1>
                <p>업무용 도구와 내부 페이지로 이동합니다.</p>
            </section>

            <section class="tool-list" aria-label="Admin tools">
                <a class="tool-card" href="/admin/mindmap">
                    <span class="tool-copy">
                        <h2>인수테스트 케이스 맵</h2>
                        <p>앱 경로를 트리로 정리하고 YAML, 테이블, Supabase 동기화로 관리합니다.</p>
                    </span>
                    <span class="tool-action">Open</span>
                </a>
            </section>
        </main>
    </div>
</body>
</html>
